weights:
  rental_ratio: 0.4
  price_growth: 0.3
  liquidation_speed: 0.2
  supply_volume: 0.1

city_boundary:
  min_lat: 30.0
  max_lat: 32.0
  min_lng: 113.0
  max_lng: 115.0

cluster:
  eps: 0.005
  min_samples: 5

